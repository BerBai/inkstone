<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Inkstone demo banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <g fill="#fff" opacity="0.15">
    <circle cx="200" cy="150" r="80"/>
    <circle cx="1000" cy="450" r="120"/>
    <circle cx="950" cy="100" r="40"/>
  </g>
  <text x="600" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="120" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-2">Inkstone</text>
  <text x="600" y="360" font-family="-apple-system, system-ui, sans-serif" font-size="32" fill="#fde68a" text-anchor="middle">A minimal bilingual Hugo theme</text>
  <text x="600" y="410" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#fed7aa" text-anchor="middle">1200 × 600 demo placeholder</text>
</svg>
