# Chinese (zh-cn) UI strings.
#
# Conventions:
#   - Use table form `[key]` + `other = "..."` for everything (canonical Hugo
#     i18n form, forward-compatible for plurals).
#   - Key naming: `<group>_<purpose>` with snake_case. Group prefixes match
#     template ownership (nav / home / posts / tags / archive / pagination /
#     post / meta / sidebar / shortcode / admonition / error_404).
#   - Brand-identifier strings (e.g., 豆瓣评分 inside douban-card) stay
#     hardcoded in their shortcode — do NOT add them here.
#
# Single source of truth: when adding a new UI string, add the key to BOTH
# this file and i18n/en.toml in the same commit. Missing-key fallback in
# Hugo: returns the default-language value when the requested language has
# no entry, so en-missing keys silently degrade to Chinese (acceptable
# during migration, audit before release).

